# Typos configuration. See https://github.com/crate-ci/typos
#
# Ignore false positives we'd otherwise trip on:
#   - "PN" inside "PNGs" gets flagged as "ON"
#   - "seeked" is the correct past-participle in media APIs (HTMLMediaElement
#     fires a `seeked` event; our AudioEngine mirrors that naming).
#   - "missable" is used deliberately in copy (opposite of "unmissable").
#   - "empted" appears inside "pre-empted" (correct English for an
#     interrupted operation; typos would coerce it to "emptied").
#   - "caf" is the Core Audio Format file extension (kAudioFileCAFType).
#   - "unparseable" is the spelling used throughout parser error paths and
#     their tests; both variants are accepted English.
#   - "mis" appears as a hyphenated prefix (mis-routing, mis-scanned,
#     mis-attributed); typos tokenizes on the hyphen and flags it alone.
#   - design/research docs contain transcribed chat snippets with typos
#     we do not own and don't want to edit after-the-fact.
#   - String Catalogs (*.xcstrings) hold non-English translations; spell-
#     checking German/Italian/French/Spanish strings as English is noise.
[default]
extend-ignore-re = [
    "PNGs",
]

[default.extend-words]
seeked = "seeked"
missable = "missable"
empted = "empted"
caf = "caf"
unparseable = "unparseable"
mis = "mis"

[files]
extend-exclude = [
    "**/*.xcstrings",
    "design/chats/**",
    "research/**",
    "target/**",
    ".build/**",
    "macos/.build/**",
    "macos/Lyrebird.xcframework/**",
]
