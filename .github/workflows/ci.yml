name: CI

on:
  push:
    branches: [main]
  pull_request:
    branches: [main]
  # Nightly re-run on main keeps the jobs we skip on PRs (Windows build,
  # universal xcframework) honest even when nobody pushes for a day.
  schedule:
    - cron: '0 6 * * *'
  workflow_dispatch:

concurrency:
  group: ci-${{ github.ref }}
  cancel-in-progress: true

env:
  CARGO_TERM_COLOR: always
  CARGO_INCREMENTAL: 0
  RUST_BACKTRACE: 1

jobs:
  fmt:
    name: rustfmt
    runs-on: ubuntu-latest
    steps:
      - uses: actions/checkout@v6
      - uses: dtolnay/rust-toolchain@stable
        with:
          components: rustfmt
      - run: cargo fmt --all -- --check

  privacy:
    name: privacy grep
    runs-on: ubuntu-latest
    steps:
      - uses: actions/checkout@v6
      # Telemetry call sites must not interpolate library/user names; the
      # runtime allowlist scrub (CrashReporting.swift) is the enforcement,
      # this grep is the review-time tripwire.
      - run: ./Scripts/privacy-grep.sh

  clippy:
    name: clippy
    runs-on: ubuntu-latest
    steps:
      - uses: actions/checkout@v6
      - uses: dtolnay/rust-toolchain@stable
        with:
          components: clippy
      - uses: Swatinem/rust-cache@v2
        with:
          key: clippy
      # Workspace pulls in the linux crate (gtk4-rs + libadwaita), so the
      # pkg-config-time checks need GTK4 headers even though we don't ship a
      # Linux binary yet.
      - name: Install GTK4 + libadwaita system deps
        run: |
          sudo apt-get update
          sudo apt-get install -y --no-install-recommends \
            libgtk-4-dev libadwaita-1-dev build-essential pkg-config
      - run: cargo clippy --workspace --all-targets --all-features -- -D warnings

  test:
    name: test (${{ matrix.os }})
    strategy:
      fail-fast: false
      matrix:
        os: [ubuntu-latest, macos-15, windows-latest]
    runs-on: ${{ matrix.os }}
    steps:
      - uses: actions/checkout@v6
      - uses: dtolnay/rust-toolchain@stable
      - uses: Swatinem/rust-cache@v2
        with:
          key: test-${{ matrix.os }}
      - name: Install GTK4 + libadwaita system deps (Linux only)
        if: runner.os == 'Linux'
        run: |
          sudo apt-get update
          sudo apt-get install -y --no-install-recommends \
            libgtk-4-dev libadwaita-1-dev build-essential pkg-config
      # On macOS / Windows the linux crate's gtk4-rs + libadwaita deps
      # can't resolve — exclude it from the workspace build there. The
      # Linux runner builds the whole workspace (gtk included) above.
      - name: cargo test (Linux — full workspace)
        if: runner.os == 'Linux'
        run: cargo test --workspace --all-features --no-fail-fast
      - name: cargo test (macOS / Windows — exclude linux crate)
        if: runner.os != 'Linux'
        run: cargo test --workspace --exclude lyrebird-desktop --all-features --no-fail-fast
      - name: cargo build (examples, same exclusion rule)
        run: |
          if [[ "${{ runner.os }}" == "Linux" ]]; then
            cargo build --workspace --all-targets --all-features
          else
            cargo build --workspace --exclude lyrebird-desktop --all-targets --all-features
          fi
        shell: bash

  docs:
    name: rustdoc
    runs-on: ubuntu-latest
    env:
      RUSTDOCFLAGS: -D warnings
    steps:
      - uses: actions/checkout@v6
      - uses: dtolnay/rust-toolchain@stable
      - uses: Swatinem/rust-cache@v2
        with:
          key: docs
      - name: Install GTK4 + libadwaita system deps
        run: |
          sudo apt-get update
          sudo apt-get install -y --no-install-recommends \
            libgtk-4-dev libadwaita-1-dev build-essential pkg-config
      - run: cargo doc --workspace --all-features --no-deps

  msrv:
    name: MSRV (Rust 1.90)
    runs-on: ubuntu-latest
    steps:
      - uses: actions/checkout@v6
      - uses: dtolnay/rust-toolchain@1.90
      - uses: Swatinem/rust-cache@v2
        with:
          key: msrv
      - name: Install GTK4 + libadwaita system deps
        run: |
          sudo apt-get update
          sudo apt-get install -y --no-install-recommends \
            libgtk-4-dev libadwaita-1-dev build-essential pkg-config
      - run: cargo check --workspace --all-features

  macos-app:
    name: macOS app
    runs-on: macos-15   # Xcode 16 / Swift 6 — our Package.swift declares tools 6.0
    steps:
      - uses: actions/checkout@v6
      - uses: maxim-lobanov/setup-xcode@v1
        with:
          xcode-version: latest-stable
      # Apple Silicon only (#660 wontfix). The PR-vs-push-to-main split
      # the original "trim CI" PR introduced collapses to a single target
      # now that Intel is permanently dropped.
      - uses: dtolnay/rust-toolchain@stable
        with:
          targets: aarch64-apple-darwin
      - uses: Swatinem/rust-cache@v2
        with:
          key: macos-app
      - name: Cache Swift Package Manager
        uses: actions/cache@v5
        with:
          path: |
            macos/.build
            ~/Library/Caches/org.swift.swiftpm
            ~/Library/Developer/Xcode/DerivedData
          key: spm-${{ runner.os }}-${{ hashFiles('macos/Package.swift', 'macos/Package.resolved') }}
          restore-keys: |
            spm-${{ runner.os }}-
      # Did the PR touch anything that could make the cached .build go
      # stale vs a fresh xcframework? Keeping the cache for unrelated
      # PRs (docs, Swift-only UI tweaks, etc.) still wins on CI time —
      # this just invalidates it when the FFI surface moves.
      - name: Detect FFI-relevant changes
        id: ffi_changed
        uses: tj-actions/changed-files@v47
        with:
          files: |
            core/src/lib.rs
            core/src/models.rs
            core/src/player.rs
            core/src/error.rs
            macos/Lyrebird.xcframework/**
            macos/Sources/LyrebirdCore/Generated/lyrebird_core.swift
      - name: Build xcframework
        working-directory: macos
        # Apple Silicon only (#660). build-core.sh defaults to arm64 — the
        # PR-vs-push split that used to live here is moot post-Intel-drop.
        run: ./Scripts/build-core.sh
      - name: swift build (clean when FFI-relevant)
        working-directory: macos
        run: |
          if [[ "${{ steps.ffi_changed.outputs.any_changed }}" == "true" ]]; then
            echo "FFI-relevant files changed — clean build to invalidate stale object cache."
            rm -rf .build
          fi
          swift build
      - name: swift test
        working-directory: macos
        # Headless unit tests for the app module (e.g. AppModel mini-player
        # state). The suite redirects XDG_DATA_HOME to a temp dir so the
        # live core it boots never touches a real data directory.
        run: swift test
      - name: Bundle .app
        working-directory: macos
        run: ./Scripts/make-bundle.sh
      - name: Smoke-launch
        working-directory: macos
        # Launch the bundled app, confirm it stays up for a few seconds,
        # terminate. No real server, just confirms the build boots.
        run: |
          ./build/Lyrebird.app/Contents/MacOS/Lyrebird > /tmp/lyrebird.log 2>&1 &
          PID=$!
          sleep 5
          if ! kill -0 $PID 2>/dev/null; then
            echo "Lyrebird exited early; log:"
            cat /tmp/lyrebird.log
            exit 1
          fi
          kill $PID
      # upload-artifact strips the common ancestor (so passing Lyrebird.app
      # uploads its *contents*), and GitHub's zip layer drops symlinks —
      # which silently breaks Sparkle.framework. ditto produces a proper
      # macOS zip that preserves the bundle; we upload that.
      - name: Archive .app bundle
        working-directory: macos/build
        run: ditto -c -k --sequesterRsrc --keepParent Lyrebird.app Lyrebird-macos-arm64.zip
      - name: Upload macOS app bundle
        uses: actions/upload-artifact@v7
        with:
          name: Lyrebird-macos-arm64
          path: macos/build/Lyrebird-macos-arm64.zip
          if-no-files-found: error
          retention-days: 7

  windows:
    name: Windows build
    # The Windows build dominates PR wall-clock (~10 min). Skip it on
    # PRs and rely on push-to-main / nightly / dispatch to catch Windows
    # regressions on the merge commit.
    if: github.event_name != 'pull_request'
    runs-on: windows-latest
    steps:
      - uses: actions/checkout@v6
      - uses: dtolnay/rust-toolchain@stable
      # rust-toolchain.toml at the repo root pins to 1.90 and overrides the
      # action's `targets:` input — the action installs targets for the
      # *requested* (stable) toolchain, not the one rustup actually selects.
      # So we install Windows targets explicitly under the active toolchain.
      - name: Install Windows Rust targets under the pinned toolchain
        shell: pwsh
        run: |
          rustup target add x86_64-pc-windows-msvc aarch64-pc-windows-msvc
      - uses: Swatinem/rust-cache@v2
        with:
          key: windows
      - uses: actions/setup-dotnet@v5
        with:
          dotnet-version: '8.0.x'
      - name: Install uniffi-bindgen-cs
        # Pin the bindgen tag in lockstep with the workspace `uniffi`
        # crate version (currently 0.29.x — see Cargo.toml).
        run: cargo install uniffi-bindgen-cs --git https://github.com/NordSecurity/uniffi-bindgen-cs --tag v0.10.0+v0.29.4 --locked
      - name: Build native core (x64 + arm64)
        shell: pwsh
        run: pwsh windows/tools/build-core.ps1 -Configuration Release
      - name: Generate C# bindings
        shell: pwsh
        run: pwsh windows/tools/gen-bindings.ps1 -Configuration Release
      - name: dotnet build (x64)
        run: dotnet build windows/Lyrebird.sln -c Release -p:Platform=x64

  # Aggregate required status — branch protection should require just this one
  # instead of each parallel job individually.
  ci:
    name: CI
    if: always()
    needs: [fmt, privacy, clippy, test, docs, msrv, macos-app, windows]
    runs-on: ubuntu-latest
    steps:
      - name: Fail if any required job failed or was cancelled
        if: contains(needs.*.result, 'failure') || contains(needs.*.result, 'cancelled')
        run: exit 1
