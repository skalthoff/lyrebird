name: macOS Release

# Triggered by pushing a `v*` tag. The tag name drives the human-readable
# version string embedded in Info.plist and the release title, so tags
# must stay in semver-ish shape (`v1.2.3`, `v1.2.3-beta.1`).
on:
  push:
    tags:
      - "v*"
  # Manual dispatch lets a maintainer re-cut a release artifact without
  # rewriting a tag — useful when only the appcast needs regenerating.
  workflow_dispatch:
    inputs:
      tag:
        description: "Tag to build (e.g. v0.2.0)"
        required: true
        type: string

concurrency:
  group: macos-release-${{ github.ref }}
  cancel-in-progress: false

permissions:
  contents: write     # gh release create / upload
  pages: write        # gh-pages appcast publish
  id-token: write     # required by deploy-pages if we switch to Pages action

jobs:
  build:
    name: Build, sign, notarize, publish
    # macos-15 (Sequoia) ships Xcode 26.x which compiles Nuke 13.0.2
    # cleanly. macos-14 only has up to Xcode 16.2, where dependency
    # builds trip Sendable errors in Nuke 13. Regular CI's macOS job
    # already runs on macos-15, so this keeps the release path on the
    # same image as PR builds.
    runs-on: macos-15
    env:
      # Resolve the tag from either push or workflow_dispatch. `github.ref_name`
      # for a tag push is the tag; for dispatch we take the input.
      RELEASE_TAG: ${{ github.event_name == 'workflow_dispatch' && inputs.tag || github.ref_name }}
    steps:
      - name: Checkout
        uses: actions/checkout@v6
        with:
          # Full history so `generate_appcast` can diff against prior
          # releases if we ever migrate that logic off the GitHub release
          # API.
          fetch-depth: 0

      - name: Select Xcode
        uses: maxim-lobanov/setup-xcode@v1
        with:
          # `latest-stable` resolves to Xcode 16.2 on the macos-14 runner
          # today. Xcode 16.x compiles Nuke 13.0.2 cleanly via single-arch
          # `swift build`. Apple Silicon only — Intel was dropped from
          # macOS distribution permanently (#660 wontfix); current install
          # base no longer justifies multi-arch build complexity, and
          # SwiftPM xcframework consumption with multi-arch is broken under
          # Xcode 26.
          xcode-version: latest-stable

      - name: Install Rust (Apple Silicon)
        uses: dtolnay/rust-toolchain@stable
        with:
          targets: aarch64-apple-darwin

      - name: Cache cargo
        uses: Swatinem/rust-cache@v2
        with:
          # Keyed by tag — release builds are infrequent and we don't
          # want a stale incremental cache to mask a genuine rebuild bug.
          key: macos-release-${{ env.RELEASE_TAG }}
          # Cache across workflow runs on the same ref so back-to-back
          # dispatch re-cuts hit the cache.
          shared-key: macos-release

      - name: Resolve version
        id: version
        run: |
          tag="${RELEASE_TAG}"
          version="${tag#v}"              # strip leading 'v' for CFBundleShortVersionString
          build=$(date -u +%Y%m%d%H%M)    # UTC timestamp — monotonically increasing CFBundleVersion
          # A hyphen only appears in a tag as a semver pre-release suffix
          # (the version core uses dots); GitHub's auto-latest heuristic
          # must never promote one of these over the stable release.
          if [[ "$tag" == *-* ]]; then
            is_prerelease=true
          else
            is_prerelease=false
          fi
          # Derive the Sparkle channel from the tag. Tags that include a
          # pre-release segment (e.g. v0.3.0-beta.1, v1.0.0-rc.2) are
          # treated as beta channel releases; pure semver tags (v1.0.0)
          # are stable. The channel is passed to generate-appcast.sh via
          # RELEASE_CHANNEL, which forwards it as --channel <value> to
          # generate_appcast so each <item> carries the correct
          # <sparkle:channel> tag. Stable clients never see beta items;
          # opted-in clients see both and install whichever is newer.
          if [[ "$tag" == *-beta* ]]; then
            release_channel=beta
          else
            release_channel=
          fi
          {
            echo "tag=$tag"
            echo "version=$version"
            echo "build=$build"
            echo "is_prerelease=$is_prerelease"
            echo "release_channel=$release_channel"
          } >> "$GITHUB_OUTPUT"

      # ------------------------------------------------------------------
      # Build the Rust xcframework and the Swift app. Apple Silicon only —
      # Intel was dropped from M4 distribution; the install base no longer
      # justifies the multi-arch build complexity (and SwiftPM xcframework
      # consumption with `swift build --arch arm64 --arch x86_64` is broken
      # under Xcode 26 — see #660 wontfix).
      # ------------------------------------------------------------------
      - name: Build xcframework
        working-directory: macos
        run: ./Scripts/build-core.sh --release

      - name: Swift build (release)
        working-directory: macos
        # Native single-arch build on the macos-15 (Apple Silicon) runner
        # — emits arm64 binaries from `.build/release/`.
        run: swift build -c release

      - name: Install create-dmg
        # Required by make-dmg.sh. Not preinstalled on macos-14.
        run: brew install create-dmg

      - name: Make app icon
        working-directory: macos
        run: ./Scripts/make-iconset.sh

      - name: Bundle .app
        working-directory: macos
        env:
          # make-bundle.sh reads $VERSION and $BUILD directly; $SPARKLE_PUBLIC_ED_KEY
          # is substituted into Info.plist via plutil -replace SUPublicEDKey.
          VERSION: ${{ steps.version.outputs.version }}
          BUILD: ${{ steps.version.outputs.build }}
          SPARKLE_PUBLIC_ED_KEY: ${{ secrets.SPARKLE_PUBLIC_ED_KEY }}
        run: ./Scripts/make-bundle.sh --release

      # ------------------------------------------------------------------
      # Sign + notarize. The individual scripts (sign.sh, notarize.sh,
      # make-dmg.sh) are introduced in BATCH-18. Each one is idempotent
      # and reads its own secrets — we just make sure the env is populated
      # before handing off.
      # ------------------------------------------------------------------
      - name: Import Developer ID certificate
        env:
          APPLE_DEVELOPER_ID_CERT_P12: ${{ secrets.APPLE_DEVELOPER_ID_CERT_P12 }}
          APPLE_DEVELOPER_ID_CERT_P12_PASSWORD: ${{ secrets.APPLE_DEVELOPER_ID_CERT_P12_PASSWORD }}
        run: |
          # Keychain lives for the life of the runner; the runner is
          # ephemeral so we don't bother deleting it at the end.
          KEYCHAIN="$RUNNER_TEMP/lyrebird.keychain-db"
          KEYCHAIN_PASSWORD="$(uuidgen)"

          security create-keychain -p "$KEYCHAIN_PASSWORD" "$KEYCHAIN"
          security set-keychain-settings -lut 21600 "$KEYCHAIN"
          security unlock-keychain -p "$KEYCHAIN_PASSWORD" "$KEYCHAIN"

          CERT_PATH="$RUNNER_TEMP/cert.p12"
          echo "$APPLE_DEVELOPER_ID_CERT_P12" | base64 --decode > "$CERT_PATH"
          security import "$CERT_PATH" \
            -k "$KEYCHAIN" \
            -P "$APPLE_DEVELOPER_ID_CERT_P12_PASSWORD" \
            -T /usr/bin/codesign
          rm -f "$CERT_PATH"

          # `codesign` looks at the default search list — prepend our
          # ephemeral keychain so the Developer ID Application identity
          # wins over anything on the runner image.
          security list-keychains -d user -s "$KEYCHAIN" $(security list-keychains -d user | tr -d '"')
          security set-key-partition-list -S apple-tool:,apple:,codesign: -s -k "$KEYCHAIN_PASSWORD" "$KEYCHAIN"

          echo "KEYCHAIN=$KEYCHAIN" >> "$GITHUB_ENV"
          echo "KEYCHAIN_PASSWORD=$KEYCHAIN_PASSWORD" >> "$GITHUB_ENV"

      - name: Sign .app
        working-directory: macos
        env:
          # sign.sh reads $DEVELOPER_ID (the cert's common name).
          DEVELOPER_ID: ${{ secrets.APPLE_DEVELOPER_ID_IDENTITY }}
        run: ./Scripts/sign.sh build/Lyrebird.app

      - name: Make DMG
        working-directory: macos
        env:
          # make-dmg.sh reads $VERSION and $DEVELOPER_ID. Without the
          # identity the DMG ships unsigned and notarization rejects it.
          VERSION: ${{ steps.version.outputs.version }}
          DEVELOPER_ID: ${{ secrets.APPLE_DEVELOPER_ID_IDENTITY }}
        run: ./Scripts/make-dmg.sh

      - name: Bootstrap notarytool keychain profile
        # notarize.sh calls `xcrun notarytool submit --keychain-profile`,
        # which requires the profile to already exist in a keychain on
        # the default search list. We write it into the ephemeral
        # keychain imported above; the runner is disposable so no cleanup.
        env:
          APPLE_NOTARY_PROFILE: ${{ secrets.APPLE_NOTARY_PROFILE }}
          APPLE_ID: ${{ secrets.APPLE_ID }}
          APPLE_APP_SPECIFIC_PASSWORD: ${{ secrets.APPLE_APP_SPECIFIC_PASSWORD }}
          APPLE_TEAM_ID: ${{ secrets.APPLE_TEAM_ID }}
        run: |
          xcrun notarytool store-credentials "$APPLE_NOTARY_PROFILE" \
            --apple-id "$APPLE_ID" \
            --team-id "$APPLE_TEAM_ID" \
            --password "$APPLE_APP_SPECIFIC_PASSWORD" \
            --keychain "$KEYCHAIN"

      - name: Notarize DMG
        working-directory: macos
        env:
          # notarize.sh reads $NOTARY_PROFILE and takes the DMG path as $1.
          NOTARY_PROFILE: ${{ secrets.APPLE_NOTARY_PROFILE }}
          VERSION: ${{ steps.version.outputs.version }}
        run: ./Scripts/notarize.sh "build/Lyrebird-${VERSION}.dmg"

      # ------------------------------------------------------------------
      # Publish the release.
      # ------------------------------------------------------------------
      - name: Create GitHub release
        env:
          GH_TOKEN: ${{ github.token }}
          TAG: ${{ steps.version.outputs.tag }}
          IS_PRERELEASE: ${{ steps.version.outputs.is_prerelease }}
        run: |
          # Don't clobber a release that already exists (re-runs via
          # workflow_dispatch). Instead, upload the freshly built DMG to
          # the existing release with --clobber so the asset is replaced.
          if gh release view "$TAG" --repo "$GITHUB_REPOSITORY" >/dev/null 2>&1; then
            echo "Release $TAG already exists — uploading asset with --clobber"
            gh release upload "$TAG" macos/build/*.dmg --clobber --repo "$GITHUB_REPOSITORY"
            # Re-enforce the never-Latest invariant on re-runs: a release
            # created by an older workflow (or manually) may still be
            # marked Latest. Demote pre-releases only — re-marking a
            # stable re-cut as --latest could wrongly promote an old tag
            # over a newer release.
            if [[ "$IS_PRERELEASE" == "true" ]]; then
              gh release edit "$TAG" --prerelease --latest=false --repo "$GITHUB_REPOSITORY"
            fi
          else
            # Stable tags pass --latest explicitly so GitHub's auto-latest
            # heuristic can't be confused by an out-of-order tag; pre-
            # releases are pinned out of the Latest slot entirely.
            latest_args=(--prerelease --latest=false)
            if [[ "$IS_PRERELEASE" != "true" ]]; then
              latest_args=(--latest)
            fi
            gh release create "$TAG" \
              --repo "$GITHUB_REPOSITORY" \
              --title "Lyrebird $TAG" \
              --generate-notes \
              --verify-tag \
              "${latest_args[@]}" \
              macos/build/*.dmg
          fi

      # ------------------------------------------------------------------
      # Regenerate appcast.xml from the freshly published release and push
      # it to gh-pages so existing installs get the update notification.
      # ------------------------------------------------------------------
      - name: Generate appcast
        env:
          SPARKLE_ED25519_PRIVATE: ${{ secrets.SPARKLE_ED25519_PRIVATE }}
          GH_TOKEN: ${{ github.token }}
          GITHUB_REPOSITORY: ${{ github.repository }}
          # Path where generate-appcast.sh writes the list of generated delta
          # files. The next step reads this to upload deltas to the release.
          DELTA_MANIFEST: ${{ runner.temp }}/delta-manifest.txt
          # Sparkle channel for this release. "beta" tags appcast items with
          # <sparkle:channel>beta</sparkle:channel> so stable-only clients
          # never see them. Empty for stable releases.
          RELEASE_CHANNEL: ${{ steps.version.outputs.release_channel }}
        run: ./macos/Scripts/generate-appcast.sh

      - name: Upload Sparkle delta files to release
        # Delta (.delta) files are generated by generate_appcast in the
        # staging DMG directory. Upload them to the current release so the
        # enclosure URLs in the freshly written appcast.xml resolve. This
        # step is a no-op on the first 1-3 releases (no prior DMGs to diff
        # against → no delta files generated).
        env:
          GH_TOKEN: ${{ github.token }}
          TAG: ${{ steps.version.outputs.tag }}
          DELTA_MANIFEST: ${{ runner.temp }}/delta-manifest.txt
        run: |
          if [[ ! -f "$DELTA_MANIFEST" ]]; then
            echo "No delta manifest found — no delta files to upload."
            exit 0
          fi

          mapfile -t delta_files < "$DELTA_MANIFEST"
          if [[ ${#delta_files[@]} -eq 0 ]]; then
            echo "Delta manifest is empty — no delta files to upload."
            exit 0
          fi

          echo "Uploading ${#delta_files[@]} delta file(s) to release $TAG:"
          for f in "${delta_files[@]}"; do
            echo "  $f"
          done

          gh release upload "$TAG" \
            --repo "$GITHUB_REPOSITORY" \
            --clobber \
            "${delta_files[@]}"

          echo "Done uploading delta files."

      - name: Publish appcast to gh-pages
        env:
          GH_TOKEN: ${{ github.token }}
        run: |
          # Dedicated worktree so the main checkout stays on the tag
          # commit and we never accidentally merge release-only content
          # back into main.
          git config --global user.name "github-actions[bot]"
          git config --global user.email "41898282+github-actions[bot]@users.noreply.github.com"

          WORKTREE="$RUNNER_TEMP/gh-pages"
          rm -rf "$WORKTREE"
          git fetch origin gh-pages:gh-pages || git branch gh-pages
          git worktree add "$WORKTREE" gh-pages

          cp docs/appcast.xml "$WORKTREE/appcast.xml"

          pushd "$WORKTREE" >/dev/null
          git add appcast.xml
          if git diff --cached --quiet; then
            echo "appcast unchanged — nothing to publish"
          else
            git commit -m "appcast: ${RELEASE_TAG}"
            git push origin gh-pages
          fi
          popd >/dev/null

          git worktree remove --force "$WORKTREE"

