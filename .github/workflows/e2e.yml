name: E2E

on:
  push:
    branches: [main]
  # Nightly re-run catches regressions even when nobody touches the repo.
  schedule:
    - cron: '0 6 * * *'
  workflow_dispatch:

concurrency:
  group: e2e-${{ github.ref }}
  cancel-in-progress: true

env:
  CARGO_TERM_COLOR: always
  RUST_BACKTRACE: 1
  # Live read-only test account on the shared test server. Authorized for
  # E2E in CLAUDE.md; writes from this account (favorites, played-flags)
  # are scoped to the user and don't pollute production data. If
  # music.skalthoff.com is unreachable, E2E fails fast at the healthcheck
  # step.
  LYREBIRD_E2E_URL: https://music.skalthoff.com
  LYREBIRD_E2E_USER: test
  LYREBIRD_E2E_PASS: test
  # Route core's credential store to a process-local map (debug builds only)
  # so headless runners never touch a real keychain. No-op on Linux, where no
  # native keyring backend is compiled in; ignored entirely by release builds.
  LYREBIRD_CREDENTIAL_STORE: memory

jobs:
  rust-core:
    name: Rust core (live Jellyfin)
    runs-on: ubuntu-latest
    steps:
      - uses: actions/checkout@v7
      - uses: dtolnay/rust-toolchain@stable
      - uses: Swatinem/rust-cache@v2
        with:
          key: e2e-rust-core
      - name: Verify test server reachable
        run: |
          curl -fsS --max-time 20 "$LYREBIRD_E2E_URL/System/Info/Public" >/dev/null \
            || { echo "::error::test server $LYREBIRD_E2E_URL unreachable"; exit 1; }
      - name: cargo test --test e2e_live
        run: cargo test --package lyrebird_core --test e2e_live -- --nocapture --test-threads=1
      - name: lyrebird-cli smoke (login + list)
        env:
          JELLYFIN_URL: ${{ env.LYREBIRD_E2E_URL }}
          JELLYFIN_USER: ${{ env.LYREBIRD_E2E_USER }}
          JELLYFIN_PASS: ${{ env.LYREBIRD_E2E_PASS }}
        # Pipe an empty line so the "Album index" prompt falls through to [0].
        # Live library is non-empty, so the CLI exercises the populated path.
        run: echo "" | cargo run --package lyrebird-cli --bin lyrebird-cli

  macos-app:
    name: macOS app (live Jellyfin)
    # Gated to main / nightly / manual to limit shared-account contention
    # on the live test server. PRs get coverage from rust-core.
    if: github.event_name != 'pull_request'
    runs-on: macos-15
    steps:
      - uses: actions/checkout@v7
      - uses: maxim-lobanov/setup-xcode@v1
        with:
          xcode-version: latest-stable
      - uses: dtolnay/rust-toolchain@stable
        with:
          targets: aarch64-apple-darwin
      - uses: Swatinem/rust-cache@v2
        with:
          key: e2e-macos
      - name: Cache Swift Package Manager
        uses: actions/cache@v6
        with:
          path: |
            macos/.build
            ~/Library/Caches/org.swift.swiftpm
            ~/Library/Developer/Xcode/DerivedData
          key: spm-macos-15-${{ hashFiles('macos/Package.swift', 'macos/Package.resolved') }}
          restore-keys: |
            spm-macos-15-
      # Same self-heal as ci.yml: a restored macos/.build that references
      # Sparkle's extracted xcframework without containing it fails every
      # swift build with "XCFramework Info.plist not found" until the cache
      # entry is deleted by hand. Clear it and rebuild clean instead.
      - name: Drop poisoned SwiftPM cache
        run: |
          if [ -d macos/.build ] && \
             [ -z "$(find macos/.build/artifacts -type f -path '*/Sparkle.xcframework/Info.plist' -print -quit 2>/dev/null)" ]; then
            echo "::warning::Restored macos/.build lacks the extracted Sparkle.xcframework — clearing it for a clean rebuild."
            rm -rf macos/.build
          fi
      - name: Verify test server reachable
        run: |
          curl -fsS --max-time 20 "$LYREBIRD_E2E_URL/System/Info/Public" >/dev/null \
            || { echo "::error::test server $LYREBIRD_E2E_URL unreachable"; exit 1; }
      - name: Build xcframework
        working-directory: macos
        run: ./Scripts/build-core.sh
      - name: swift build
        working-directory: macos
        run: swift build
      - name: SmokeTest against live Jellyfin
        working-directory: macos
        env:
          JELLYFIN_URL: ${{ env.LYREBIRD_E2E_URL }}
          JELLYFIN_USER: ${{ env.LYREBIRD_E2E_USER }}
          JELLYFIN_PASS: ${{ env.LYREBIRD_E2E_PASS }}
        run: |
          set +e
          ./.build/arm64-apple-macosx/debug/SmokeTest > /tmp/smoke.log 2>&1
          RC=$?
          cat /tmp/smoke.log
          # Login must have succeeded.
          if ! grep -q "logged in as" /tmp/smoke.log; then
            echo "::error::SmokeTest never reported a successful login"
            exit 1
          fi
          # Live library is populated, so transport must complete cleanly
          # (rc=0). The "no albums on server" bailout path is dead against
          # this server.
          if [[ $RC -ne 0 ]]; then
            echo "::error::SmokeTest failed with rc=$RC"
            exit 1
          fi
