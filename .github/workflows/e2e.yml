name: E2E

on:
  push:
    branches: [main]
  # Nightly re-run catches regressions even when nobody touches the repo.
  schedule:
    - cron: '0 6 * * *'
  workflow_dispatch:

concurrency:
  group: e2e-${{ github.ref }}
  cancel-in-progress: true

env:
  CARGO_TERM_COLOR: always
  RUST_BACKTRACE: 1
  # Live read-only test account on the shared test server. Authorized for
  # E2E in CLAUDE.md; writes from this account (favorites, played-flags)
  # are scoped to the user and don't pollute production data. If
  # music.skalthoff.com is unreachable, E2E fails fast at the healthcheck
  # step.
  JELLIFY_E2E_URL: https://music.skalthoff.com
  JELLIFY_E2E_USER: test
  JELLIFY_E2E_PASS: test
  # The test server is fronted by Cloudflare Access, which 403s anonymous
  # traffic from GitHub Actions runner IPs. The service-token pair below
  # is scoped to read-only / E2E use; client.rs auto-attaches them to
  # every outbound request when both are set.
  CF_ACCESS_CLIENT_ID: ${{ secrets.CF_ACCESS_CLIENT_ID }}
  CF_ACCESS_CLIENT_SECRET: ${{ secrets.CF_ACCESS_CLIENT_SECRET }}

jobs:
  rust-core:
    name: Rust core (live Jellyfin)
    runs-on: ubuntu-latest
    steps:
      - uses: actions/checkout@v6
      - uses: dtolnay/rust-toolchain@stable
      - uses: Swatinem/rust-cache@v2
        with:
          key: e2e-rust-core
      - name: Verify test server reachable
        run: |
          curl -fsS --max-time 20 \
            -H "CF-Access-Client-Id: $CF_ACCESS_CLIENT_ID" \
            -H "CF-Access-Client-Secret: $CF_ACCESS_CLIENT_SECRET" \
            "$JELLIFY_E2E_URL/System/Info/Public" >/dev/null \
            || { echo "::error::test server $JELLIFY_E2E_URL unreachable"; exit 1; }
      - name: cargo test --test e2e_live
        run: cargo test --package jellify_core --test e2e_live -- --nocapture --test-threads=1
      - name: jellify-cli smoke (login + list)
        env:
          JELLYFIN_URL: ${{ env.JELLIFY_E2E_URL }}
          JELLYFIN_USER: ${{ env.JELLIFY_E2E_USER }}
          JELLYFIN_PASS: ${{ env.JELLIFY_E2E_PASS }}
        # Pipe an empty line so the "Album index" prompt falls through to [0].
        # Live library is non-empty, so the CLI exercises the populated path.
        run: echo "" | cargo run --package jellify-cli --bin jellify-cli

  macos-app:
    name: macOS app (live Jellyfin)
    # Gated to main / nightly / manual to limit shared-account contention
    # on the live test server. PRs get coverage from rust-core.
    if: github.event_name != 'pull_request'
    runs-on: macos-15
    steps:
      - uses: actions/checkout@v6
      - uses: maxim-lobanov/setup-xcode@v1
        with:
          xcode-version: latest-stable
      - uses: dtolnay/rust-toolchain@stable
        with:
          targets: aarch64-apple-darwin
      - uses: Swatinem/rust-cache@v2
        with:
          key: e2e-macos
      - name: Cache Swift Package Manager
        uses: actions/cache@v5
        with:
          path: |
            macos/.build
            ~/Library/Caches/org.swift.swiftpm
            ~/Library/Developer/Xcode/DerivedData
          key: spm-macos-15-${{ hashFiles('macos/Package.swift', 'macos/Package.resolved') }}
          restore-keys: |
            spm-macos-15-
      - name: Verify test server reachable
        run: |
          curl -fsS --max-time 20 \
            -H "CF-Access-Client-Id: $CF_ACCESS_CLIENT_ID" \
            -H "CF-Access-Client-Secret: $CF_ACCESS_CLIENT_SECRET" \
            "$JELLIFY_E2E_URL/System/Info/Public" >/dev/null \
            || { echo "::error::test server $JELLIFY_E2E_URL unreachable"; exit 1; }
      - name: Build xcframework
        working-directory: macos
        run: ./Scripts/build-core.sh
      - name: swift build
        working-directory: macos
        run: swift build
      - name: SmokeTest against live Jellyfin
        working-directory: macos
        env:
          JELLYFIN_URL: ${{ env.JELLIFY_E2E_URL }}
          JELLYFIN_USER: ${{ env.JELLIFY_E2E_USER }}
          JELLYFIN_PASS: ${{ env.JELLIFY_E2E_PASS }}
        run: |
          set +e
          ./.build/arm64-apple-macosx/debug/SmokeTest > /tmp/smoke.log 2>&1
          RC=$?
          cat /tmp/smoke.log
          # Login must have succeeded.
          if ! grep -q "logged in as" /tmp/smoke.log; then
            echo "::error::SmokeTest never reported a successful login"
            exit 1
          fi
          # Live library is populated, so transport must complete cleanly
          # (rc=0). The "no albums on server" bailout path is dead against
          # this server.
          if [[ $RC -ne 0 ]]; then
            echo "::error::SmokeTest failed with rc=$RC"
            exit 1
          fi
