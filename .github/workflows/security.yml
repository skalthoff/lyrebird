name: Security

on:
  push:
    branches: [main]
    paths:
      - '**/Cargo.toml'
      - '**/Cargo.lock'
      - 'deny.toml'
      - '.github/workflows/security.yml'
  pull_request:
    branches: [main]
    paths:
      - '**/Cargo.toml'
      - '**/Cargo.lock'
      - 'deny.toml'
      - '.github/workflows/security.yml'
  schedule:
    # Weekly Monday 07:00 UTC — picks up newly-published RustSec advisories
    # even when nobody's touched Cargo.lock.
    - cron: '0 7 * * 1'
  workflow_dispatch:

concurrency:
  group: security-${{ github.ref }}
  cancel-in-progress: true

jobs:
  audit:
    name: cargo-audit
    runs-on: ubuntu-latest
    steps:
      - uses: actions/checkout@v7
      # cargo-audit 0.22.x parses RustSec's CVSS 4.0 advisory entries (e.g.
      # RUSTSEC-2026-0073). Its transitive deps need rustc >= 1.89, satisfied
      # now that the workspace MSRV and the root rust-toolchain.toml pin are
      # 1.90. Constrain to ^0.22 so CI still picks up 0.22.x patches but a
      # future 0.23 that raises cargo-audit's own build-MSRV can't silently
      # break the install; --locked keeps transitive resolution on the
      # published Cargo.lock. `cargo audit` then fetches and parses the full
      # advisory-db itself — no manual clone / CVSS-4.0 prune.
      - name: Install cargo-audit
        run: cargo install cargo-audit --locked --version "^0.22"
      - name: Run cargo audit
        run: cargo audit

  deny:
    name: cargo-deny (${{ matrix.checks }})
    runs-on: ubuntu-latest
    strategy:
      fail-fast: false
      matrix:
        # `licenses` is deliberately allowed to fail the job on its own so
        # license-shape surprises land as annotations, not red crosses.
        # advisories / bans / sources stay strict.
        checks:
          - advisories
          - bans
          - sources
          - licenses
    continue-on-error: ${{ matrix.checks == 'licenses' }}
    steps:
      - uses: actions/checkout@v7
      - uses: EmbarkStudios/cargo-deny-action@v2
        with:
          command: check ${{ matrix.checks }}

  typos:
    name: typos
    runs-on: ubuntu-latest
    steps:
      - uses: actions/checkout@v7
      - uses: crate-ci/typos@master

  actions:
    name: zizmor (GH Actions lint)
    # zizmor audits workflow YAML for common supply-chain / permissions
    # footguns — things like unpinned actions, ambient $GITHUB_TOKEN leaks into
    # third-party steps, and pull_request_target misuse. Cheap insurance now
    # that the workflow count is growing.
    runs-on: ubuntu-latest
    permissions:
      security-events: write
      contents: read
    steps:
      - uses: actions/checkout@v7
        with:
          persist-credentials: false
      - uses: astral-sh/setup-uv@v7
      - name: Run zizmor
        env:
          GH_TOKEN: ${{ secrets.GITHUB_TOKEN }}
        run: uvx zizmor --format sarif --persona=auditor . > zizmor.sarif
      - uses: github/codeql-action/upload-sarif@v4
        with:
          sarif_file: zizmor.sarif
          category: zizmor
